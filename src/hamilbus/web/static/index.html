<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hamilbus Network Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        position: absolute;
        top: 0;
        left: 0;
        width: 320px;
        height: 100vh;
        overflow-y: auto;
        background: #fafafa;
        border-right: 1px solid #ddd;
        padding: 16px;
        box-sizing: border-box;
        z-index: 1000;
      }
      #map {
        position: absolute;
        top: 0;
        left: 320px;
        right: 0;
        bottom: 0;
      }
      h1 { margin: 0 0 16px; font-size: 22px; }
      .section { margin-bottom: 18px; }
      .line-item { display: flex; align-items: center; margin-bottom: 8px; }
      .line-color { width: 18px; height: 18px; border-radius: 4px; margin-right: 8px; flex-shrink: 0; }
      .line-name { font-size: 14px; overflow-wrap: anywhere; }
      #status { font-size: 13px; color: #555; }
      #status.error { color: #c00; font-weight: bold; }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>Hamilbus Viewer</h1>
      <div class="section">
        <label><input id="toggle-stops" type="checkbox" checked /> Afficher les stops</label>
      </div>
      <div class="section">
        <strong>Afficher / masquer les lignes</strong>
        <div id="line-list"></div>
      </div>
      <div class="section" id="status">Chargement des données...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map("map").setView([48.8566, 2.3522], 12);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      const stopLayer = L.layerGroup().addTo(map);
      const lineLayers = {};
      const statusEl = document.getElementById("status");
      const lineList = document.getElementById("line-list");

      function setStatus(message, isError) {
        statusEl.textContent = message;
        statusEl.className = isError ? "error" : "";
      }

      function drawStops(stops) {
        stopLayer.clearLayers();
        stops.forEach(function(stop) {
          L.circleMarker([stop.lat, stop.lon], {
            radius: 5,
            fillColor: "black",
            color: "white",
            weight: 1,
            fillOpacity: 0.9,
          })
            .bindPopup("<strong>" + stop.name + "</strong><br/>" + stop.type)
            .addTo(stopLayer);
        });
      }

      function drawLines(lines) {
        lines.forEach(function(line) {
          if (!line.shape || line.shape.length < 2) return;

          var coords = line.shape.map(function(p) { return [p.lat, p.lon]; });
          var layer = L.polyline(coords, {
            color: line.color || "#3388ff",
            weight: 4,
            opacity: 0.7,
          }).addTo(map);
          lineLayers[line.index] = layer;

          var wrapper = document.createElement("div");
          wrapper.className = "line-item";

          var checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = true;
          checkbox.addEventListener("change", function() {
            if (checkbox.checked) {
              layer.addTo(map);
            } else {
              map.removeLayer(layer);
            }
          });

          var colorBox = document.createElement("span");
          colorBox.className = "line-color";
          colorBox.style.backgroundColor = line.color || "#3388ff";

          var label = document.createElement("span");
          label.className = "line-name";
          label.textContent = line.name + " (" + (line.long_name || "-") + ")";

          wrapper.appendChild(checkbox);
          wrapper.appendChild(colorBox);
          wrapper.appendChild(label);
          lineList.appendChild(wrapper);
        });
      }

      function fitMap(stops, lines) {
        var bounds = [];
        stops.forEach(function(s) { bounds.push([s.lat, s.lon]); });
        lines.forEach(function(l) {
          if (l.shape) l.shape.forEach(function(p) { bounds.push([p.lat, p.lon]); });
        });
        if (bounds.length) map.fitBounds(bounds, { padding: [24, 24] });
      }

      document.getElementById("toggle-stops").addEventListener("change", function(e) {
        if (e.target.checked) {
          stopLayer.addTo(map);
        } else {
          map.removeLayer(stopLayer);
        }
      });

      async function loadData() {
        try {
          const [stopsRes, linesRes] = await Promise.all([
            fetch("/api/stops"),
            fetch("/api/lines"),
          ]);

          if (!stopsRes.ok) {
            setStatus("Erreur stops : HTTP " + stopsRes.status, true);
            return;
          }
          if (!linesRes.ok) {
            setStatus("Erreur lignes : HTTP " + linesRes.status, true);
            return;
          }

          const stops = await stopsRes.json();
          const lines = await linesRes.json();

          if (stops.length === 0 && lines.length === 0) {
            setStatus("Aucune donnée disponible.");
            return;
          }

          drawStops(stops);
          drawLines(lines);
          fitMap(stops, lines);
          setStatus("Chargé " + stops.length + " stops et " + lines.length + " lignes.");
        } catch (e) {
          setStatus("Erreur réseau : " + e.message, true);
        }
      }

      loadData();
    </script>
  </body>
</html>
